name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    uses: ./.github/workflows/checks.yml

  publish-snapshot:
    name: Publish snapshot binaries
    needs: checks
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    uses: ./.github/workflows/publish.yml
    with:
      ref: main
      release_tag: latest-snapshot
      release_title: latest-snapshot
      prerelease: true
      asset_prefix: sudoku-snapshot
